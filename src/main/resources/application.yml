server:
  port: 8080
  servlet:
    session:
      timeout: 30d
      cookie:
        http-only: true
        same-site: lax
        secure: false  # set to true behind HTTPS-terminating proxy

spring:
  application:
    name: projector
  jooq:
    sql-dialect: postgres
  mvc:
    static-path-pattern: /**
  security:
    filter:
      dispatcher-types: request, async

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    io.github.pgatzka.projector: DEBUG
