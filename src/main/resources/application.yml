server:
  port: 8080

spring:
  application:
    name: projector
  jooq:
    sql-dialect: postgres
  mvc:
    static-path-pattern: /**
  security:
    filter:
      # Spring Security 7 processes all dispatch types (REQUEST, FORWARD, ERROR, ASYNC)
      # by default. When WelcomePageHandlerMapping or SpaFallbackConfig issues an
      # internal FORWARD (e.g. "/" → "/index.html"), FilterChainProxy re-wraps the
      # already-firewalled request in a second FirewalledRequest, causing infinite
      # recursion in ServletRequestWrapper.getRemoteAddr() → StackOverflowError.
      # Restricting to REQUEST + ASYNC prevents this without compromising security:
      # FORWARD dispatches are purely internal MVC routing to already-permitted resources.
      dispatcher-types: request, async

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    io.github.pgatzka.projector: DEBUG
