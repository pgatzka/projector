name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build, test, package (jar)
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Read project version
        id: version
        run: |
          VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t projector:${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }} .
          docker tag projector:${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }} \
                     projector:${{ steps.version.outputs.version }}

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          REPO_LC=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${{ steps.version.outputs.short_sha }}"

          docker tag projector:${VERSION}-${SHORT_SHA} ${{ env.REGISTRY }}/${REPO_LC}:${VERSION}-${SHORT_SHA}
          docker tag projector:${VERSION}             ${{ env.REGISTRY }}/${REPO_LC}:${VERSION}

          docker push ${{ env.REGISTRY }}/${REPO_LC}:${VERSION}-${SHORT_SHA}
          docker push ${{ env.REGISTRY }}/${REPO_LC}:${VERSION}
